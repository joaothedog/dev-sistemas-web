{% extends "layout.html" %}

{% block body %}

<h2>Gerenciar Minicursos</h2>

<p style="text-align: center;">
  <a href="{{ url_for('minicursos.criar') }}">Novo Minicurso</a>
</p>

<table border="1">
    <tr>
        <th scope="col">ID</th>
        <th scope="col">Nome</th>
        <th scope="col">Ações</th>
    </tr>

    {% for minicurso in minicursos %}
    <tr>
        <td>{{ minicurso.id }}</td>
        <td>{{ minicurso.nome }}</td>
        <td>
           <a href="{{ url_for('minicursos.editar', minicurso_id=minicurso.id) }}">Editar</a>
           |
           <form action="{{ url_for('minicursos.excluir') }}" method="POST" style="display:inline;">
             <!-- Token de protecao CSRF -->
             <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
             <input name="id" type="hidden" value='{{ minicurso.id }}'>
             <button type="submit" aria-label="Excluir minicurso {{ minicurso.nome }}"
                     onclick="return confirm('Deseja realmente excluir o minicurso {{ minicurso.nome }}?')">
                 Excluir
             </button>
           </form>
        </td>
    </tr>
    {% else %}
    <tr>
        <td colspan="3" style="text-align: center;">Nenhum minicurso cadastrado.</td>
    </tr>
    {% endfor %}
</table>

<br>
<div style="text-align: center;">
  <a href="{{ url_for('inscritos.index') }}">Voltar</a>
</div>

{% endblock %}
